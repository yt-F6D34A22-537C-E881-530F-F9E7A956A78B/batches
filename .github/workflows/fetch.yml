name: fetch.yml - Fetch Yahoo Finance Chart Data

permissions:
  contents: write

on:
  schedule:
    - cron: "0 22 * * *"  # JST 07:00 = UTC 22:00（前日）
    - cron: "0 7 * * *"   # JST 16:00 = UTC 07:00
    - cron: "0 9 * * *"   # JST 18:00 = UTC 09:00
    - cron: "0 11 * * *"  # JST 20:00 = UTC 11:00
  workflow_dispatch:

jobs:
  fetch:
    runs-on: ubuntu-latest

    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "24"

      - name: Install dependencies
        run: npm install node-fetch@3 xlsx

      - name: Ensure data directory exists
        run: |
          mkdir -p data

      - name: Run fetch script
        run: node fetch.js

      - name: Commit and push changes
        run: |
          git config --global user.name "github-actions"
          git config --global user.email "github-actions@github.com"
          git add data/data.json data/backup/ || true
          git commit -m "Update data.json and backup" || echo "No changes"
          # リモートの変更を取り込む
          git pull --rebase || true
          git push
