name: JPX data_j.xls fetch & convert (scraping)

on:
  schedule:
    - cron: "0 1 * * *"   # 毎日 10:00 JST（1:00 UTC）
  workflow_dispatch:

permissions:
  contents: write

jobs:
  fetch-convert-commit:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libreoffice python3 python3-pip
          pip3 install requests beautifulsoup4 lxml

      - name: Scrape JPX page to get data_j.xls URL
        id: scrape
        run: |
          python3 << 'EOF'
import requests
from bs4 import BeautifulSoup
from urllib.parse import urlparse
import os

url = "https://www.jpx.co.jp/markets/statistics-equities/misc/01.html"

parsed = urlparse(url)
root = f"{parsed.scheme}://{parsed.netloc}"

html = requests.get(url).text
soup = BeautifulSoup(html, "lxml")

link = None
for a in soup.find_all("a", href=True):
    if "data_j.xls" in a["href"]:
        link = a["href"]
        break

if not link:
    raise Exception("data_j.xls のリンクが見つかりませんでした")

if link.startswith("/"):
    link = root + link

# GitHub Actions の新しい出力方式（GITHUB_OUTPUT）を使用
with open(os.environ["GITHUB_OUTPUT"], "a", encoding="utf-8") as f:
    f.write(f"url={link}\n")
EOF

      - name: Download data_j.xls
        run: |
          curl -L "${{ steps.scrape.outputs.url }}" -o data_j.xls

      - name: Convert XLS → XLSX (temporary name)
        run: |
          libreoffice --headless --convert-to xlsx data_j.xls --outdir .
          mv data_j.xlsx data_j_test.xlsx

      - name: Commit & Push
        run: |
          git config user.name "github-actions"
          git config user.email "actions@github.com"
          git add data_j.xls data_j_test.xlsx
          git commit -m "Auto-update JPX data_j.xls → data_j_test.xlsx (temporary)" || echo "No changes to commit"
          git push
