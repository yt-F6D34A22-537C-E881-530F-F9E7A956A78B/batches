name: JPX data_j.xls fetch & convert (scraping + backup)

on:
  schedule:
    - cron: "0 18 * * *"   # JST 3:00（UTC 18:00）
  workflow_dispatch:

permissions:
  contents: write

jobs:
  fetch-convert-commit:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libreoffice python3 python3-pip
          pip3 install requests beautifulsoup4 lxml

      - name: Scrape JPX page to get data_j.xls URL
        id: scrape
        shell: python
        run: |
          import requests
          from bs4 import BeautifulSoup
          from urllib.parse import urlparse
          import os

          url = "https://www.jpx.co.jp/markets/statistics-equities/misc/01.html"

          parsed = urlparse(url)
          root = f"{parsed.scheme}://{parsed.netloc}"

          html = requests.get(url).text
          soup = BeautifulSoup(html, "lxml")

          link = None
          for a in soup.find_all("a", href=True):
              if "data_j.xls" in a["href"]:
                  link = a["href"]
                  break

          if not link:
              raise Exception("data_j.xls のリンクが見つかりませんでした")

          if link.startswith("/"):
              link = root + link

          with open(os.environ["GITHUB_OUTPUT"], "a") as f:
              f.write(f"url={link}\n")

      - name: Download data_j.xls
        run: |
          curl -L "${{ steps.scrape.outputs.url }}" -o data_j.xls

      - name: Convert XLS → XLSX (temporary name)
        run: |
          libreoffice --headless --convert-to xlsx data_j.xls --outdir .
          mv data_j.xlsx data_j_test.xlsx

      - name: Backup original and converted files
        run: |
          mkdir -p backup
          TS=$(date +"%Y%m%d_%H%M%S")
          cp data_j.xls backup/data_j.xls.$TS
          cp data_j_test.xlsx backup/data_j_test.xlsx.$TS

      - name: Cleanup old backups (older than 3 days)
        run: |
          find backup -type f \( -name "data_j.xls.*" -o -name "data_j_test.xlsx.*" \) -mtime +3 -exec rm {} \;

      - name: Commit & Push
        run: |
          git config user.name "github-actions"
          git config user.email "actions@github.com"
          git add data_j.xls data_j_test.xlsx backup/
          git commit -m "Auto-update JPX data_j + backup" || echo "No changes to commit"
          git push
