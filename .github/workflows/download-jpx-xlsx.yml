name: download-jpx-xlsx.yml - JPX data_j.xls fetch & convert (scraping + backup)

on:
  schedule:
    - cron: "0 18 * * *"   # JST 3:00（UTC 18:00）
  workflow_dispatch:

permissions:
  contents: write

jobs:
  fetch-convert-commit:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "24"

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libreoffice
          npm install node-fetch@3 xlsx jsdom pdf-parse

      - name: Ensure data directory exists
        run: mkdir -p data

      - name: Run JPX fetch script
        run: node download-jpx-xlsx.js

      - name: Commit & Push
        run: |
          git config --global user.name "github-actions"
          git config --global user.email "github-actions@github.com"
          git add data/data_j.xlsx data/backup/ || true
          git commit -m "Auto-update JPX data_j.xlsx + backup" || echo "No changes"
          git pull --rebase || true
          git push
