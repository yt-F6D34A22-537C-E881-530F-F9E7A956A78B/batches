name: Margin Info Fetch (All Codes New Logic, 281A Fixed)

on:
  schedule:
    - cron: "0 18 * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  fetch-margin-info:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y python3 python3-pip
          pip3 install requests pandas beautifulsoup4 lxml pdfplumber openpyxl xlrd==2.0.1

      - name: Run margin-info scraper
        shell: python
        run: |
          import requests
          import pandas as pd
          import json
          import re
          import pdfplumber
          import unicodedata
          from bs4 import BeautifulSoup

          UA = {"User-Agent": "Mozilla/5.0"}

          # ============================================================
          # 1. JSF 貸借銘柄
          # ============================================================
          base = "https://www.taisyaku.jp/data/"
          meigara_df = pd.read_csv(
              base + "meigara.csv",
              encoding="shift_jis",
              dtype=str,
              skiprows=1
          )
          meigara_df.columns = meigara_df.columns.str.strip().str.replace("\ufeff", "", regex=False)

          kubun_map = {}
          for _, row in meigara_df.iterrows():
              raw_code = str(row["コード"])
              code = unicodedata.normalize("NFKC", raw_code).zfill(4)
              kubun_map[code] = str(row["貸借銘柄区分（東証）"])

          # ============================================================
          # 2. 楽天証券 規制ページ（全銘柄 新ロジック）
          # 
          # 楽天証券 規制文言辞書（出典：公式ページ）
          # https://www.rakuten-sec.co.jp/ITS/qaOth0007.html
          #
          # 【公式ページに掲載されている規制文言一覧】
          # - 整理銘柄
          # - 監理銘柄（審査中）
          # - 監理銘柄（確認中）
          # - 特別注意銘柄
          # - 監視区分銘柄
          # - 増担保***％（うち現金***％）
          # - レバETF
          # - 日々公表銘柄
          # - 貸株注意喚起
          # - 申告規制
          # - 即日預託
          # - 制度信用社内規制
          # - 一般信用社内規制
          # - 建玉上限
          #
          # - 代用掛目規制***％
          # - 代用掛目規制予定***％
          #
          # - 新規買停止
          # - 一般信用新規買停止
          # - 新規売停止
          # - 一般信用新規売停止
          # - 返済買埋停止
          # - 一般信用返済買埋停止
          # - 返済売埋停止
          # - 一般信用返済売埋停止
          # - 現引停止
          # - 一般信用現引停止
          # - 現渡停止
          # - 一般信用現渡停止
          # - 全取引停止
          # - 現物売付停止
          # - 現物買付停止
          #
          # 【採用した文言】
          # - 新規買停止 → BUY_BAN_KEYWORDS に採用
          # - 新規売停止 → SELL_BAN_KEYWORDS に採用
          # - 全取引停止 → BUY/SELL 両方に採用
          #
          # 【採用しなかった文言と理由】
          # - 「整理銘柄」「監理銘柄」「特別注意銘柄」など → 新規建て可否に直接影響しないため
          # - 「増担保」「代用掛目規制」 → 新規建て可否ではなく担保率の問題のため
          # - 「レバETF」 → 種類分類であり規制ではないため
          # - 「日々公表銘柄」 → 注意喚起であり新規建て可否には影響しないため
          # - 「貸株注意喚起」 → 同上
          # - 「申告規制」「即日預託」 → 新規建て可否とは別種の規制のため
          # - 「現引停止」「現渡停止」 → 決済方法の制限であり新規建て可否とは別
          # - 「現物売付停止」「現物買付停止」 → 現物取引の規制であり信用取引の新規建てとは無関係
          # ============================================================
          BUY_BAN_KEYWORDS = ["新規買停止", "全取引停止"]
          SELL_BAN_KEYWORDS = ["新規売停止", "全取引停止"]

          rakuten_url = "https://www.rakuten-sec.co.jp/ITS/Companyfile/margin_restriction.html"
          res = requests.get(rakuten_url, headers=UA)
          res.encoding = res.apparent_encoding
          html = res.text

          soup = BeautifulSoup(html, "lxml")

          regulation_map = {}

          TOKYO_KEYWORDS = ["東京"]

          current_vals = [None] * 6
          rowspan_left = [0] * 6

          for row in soup.select("table tr"):
              tds = row.find_all("td")
              if not tds:
                  continue

              logical = [None] * 6
              td_i = 0

              # rowspan 継承
              for col in range(6):
                  if rowspan_left[col] > 0:
                      logical[col] = current_vals[col]
                      rowspan_left[col] -= 1

              # 通常セル
              for col in range(6):
                  if logical[col] is not None:
                      continue
                  if td_i >= len(tds):
                      break

                  td = tds[td_i]
                  text = td.get_text(strip=True)
                  logical[col] = text

                  rs = td.get("rowspan")
                  if rs:
                      rowspan_left[col] = int(rs) - 1
                      current_vals[col] = text

                  td_i += 1

              raw_code = logical[0]
              market = logical[2]
              text = logical[3]

              if not raw_code:
                  continue

              code = unicodedata.normalize("NFKC", raw_code)

              # 市場フィルタ
              if market:
                  m = unicodedata.normalize("NFKC", market).replace(" ", "").replace("　", "")
                  market_flag = any(k in m for k in TOKYO_KEYWORDS)
              else:
                  market_flag = False

              if not market_flag:
                  continue

              # 規制文言を格納（全銘柄）
              regulation_map.setdefault(code, []).append(text)

          # ============================================================
          # 3. JPX PDF（週次）取得 ＋ 281A 対応
          # ============================================================
          jpx_page = "https://www.jpx.co.jp/markets/statistics-equities/margin/05.html"
          jpx_html = requests.get(jpx_page, headers=UA).text
          jpx_soup = BeautifulSoup(jpx_html, "lxml")

          pdf_links = []
          for a in jpx_soup.find_all("a", href=True):
              href = a["href"]
              if href.endswith(".pdf") and "syumatsu" in href:
                  pdf_links.append("https://www.jpx.co.jp" + href)

          latest_pdf = sorted(pdf_links)[-1]

          pdf_data = requests.get(latest_pdf, headers=UA).content
          with open("jpx.pdf", "wb") as f:
              f.write(pdf_data)

          # PDF パース
          jpx_map = {}

          with pdfplumber.open("jpx.pdf") as pdf:
              full_text = ""
              for page in pdf.pages:
                  t = page.extract_text()
                  if t:
                      full_text += "\n" + t

          # ★ 281A0 など「4桁＋0」形式に対応
          blocks = re.split(r"(?=[0-9A-Z]{4}0\s+JP\d{10})", full_text)

          def parse_num(s):
              s = s.replace(",", "").replace(" ", "")
              if s in ("", "▲"):
                  return 0
              if s.startswith("▲"):
                  return -int(s[1:])
              return int(s)

          for block in blocks:
              m = re.search(r"([0-9A-Z]{4}0)\s+JP\d{10}", block)
              if not m:
                  continue

              raw_code5 = m.group(1)  # 例: 281A0, 72030
              code4 = unicodedata.normalize("NFKC", raw_code5[:4])  # 例: 281A, 7203

              after_isin = re.split(r"JP\d{10}", block)[1]
              nums = re.findall(r"[▲\-]?\s*[\d,]+", after_isin)
              nums = [parse_num(n) for n in nums]

              if len(nums) < 4:
                  continue

              sell = nums[0]
              sell_diff = nums[1]
              buy = nums[2]
              buy_diff = nums[3]

              ratio = round(buy / sell, 2) if sell != 0 else None

              jpx_map[code4] = {
                  "buy": buy,
                  "buy_diff": buy_diff,
                  "sell": sell,
                  "sell_diff": sell_diff,
                  "ratio": ratio
              }

          # ============================================================
          # 4. 日々公表（XLS）で上書き ＋ 281A 対応
          # ============================================================
          daily_index = "https://www.jpx.co.jp/markets/statistics-equities/margin/index.html"
          daily_html = requests.get(daily_index, headers=UA).text
          daily_soup = BeautifulSoup(daily_html, "lxml")

          daily_links = []
          for a in daily_soup.find_all("a", href=True):
              href = a["href"]
              if re.search(r"mtdailyk.*\.xls$", href):
                  daily_links.append(href)

          latest_daily = sorted(daily_links)[-1]
          daily_url = "https://www.jpx.co.jp" + latest_daily

          daily_df = pd.read_excel(
              daily_url,
              dtype=str,
              engine="xlrd",
              header=5
          )

          code_col = "コード"
          sell_col = "売残高 Outstanding Sales"
          buy_col  = "買残高 Outstanding Purchases"

          daily_map = {}
          for _, row in daily_df.iterrows():
              raw = str(row[code_col]).strip()
              # ★ 281A0 / 72030 など「4桁＋0」形式に対応
              if re.fullmatch(r"[0-9A-Z]{4}0", raw):
                  code4 = unicodedata.normalize("NFKC", raw[:4])
                  try:
                      sell = int(str(row[sell_col]).replace(",", ""))
                      buy = int(str(row[buy_col]).replace(",", ""))
                  except Exception:
                      continue
                  daily_map[code4] = {"sell": sell, "buy": buy}

          # 日々公表で上書き
          for code4, d in daily_map.items():
              if code4 in jpx_map:
                  prev_buy = jpx_map[code4]["buy"]
                  prev_sell = jpx_map[code4]["sell"]

                  new_buy = d["buy"]
                  new_sell = d["sell"]

                  jpx_map[code4]["buy"] = new_buy
                  jpx_map[code4]["sell"] = new_sell

                  jpx_map[code4]["buy_diff"] = new_buy - prev_buy
                  jpx_map[code4]["sell_diff"] = new_sell - prev_sell

                  jpx_map[code4]["ratio"] = (
                      round(new_buy / new_sell, 2) if new_sell != 0 else None
                  )
              else:
                  jpx_map[code4] = {
                      "buy": d["buy"],
                      "buy_diff": None,
                      "sell": d["sell"],
                      "sell_diff": None,
                      "ratio": round(d["buy"] / d["sell"], 2) if d["sell"] != 0 else None
                  }

          # ============================================================
          # 5. margin.json 統合（全銘柄 新ロジック）
          # ============================================================
          margin = {}

          all_codes = list(regulation_map.keys()) \
                   + list(kubun_map.keys()) \
                   + list(jpx_map.keys())
          all_codes = list(dict.fromkeys(all_codes))

          for raw_code in all_codes:
              code = unicodedata.normalize("NFKC", raw_code)

              kubun = kubun_map.get(code)
              regs = regulation_map.get(code, [])
              jpx = jpx_map.get(code, {})

              has_sell_ban = any(
                  any(k in r for k in SELL_BAN_KEYWORDS)
                  for r in regs
              )
              has_buy_ban = any(
                  any(k in r for k in BUY_BAN_KEYWORDS)
                  for r in regs
              )

              sei_buy = not has_buy_ban
              sei_sell = (kubun == "1") and (not has_sell_ban)

              margin[code] = {
                  "貸借区分": kubun,
                  "制度信用": {
                      "買い建て": sei_buy,
                      "売り建て": sei_sell
                  },
                  "JPX信用買残": jpx.get("buy"),
                  "JPX信用買残前週比": jpx.get("buy_diff"),
                  "JPX信用売残": jpx.get("sell"),
                  "JPX信用売残前週比": jpx.get("sell_diff"),
                  "JPX信用倍率": jpx.get("ratio"),
                  "規制": regs
              }

          with open("margin.json", "w", encoding="utf-8") as f:
              json.dump(margin, f, ensure_ascii=False, indent=2)

      - name: Commit & Push
        run: |
          git config user.name "github-actions"
          git config user.email "actions@github.com"
          git add margin.json || true
          git commit -m "Auto-update margin.json (All Codes New Logic, 281A Fixed)" || echo "No changes to commit"
          git push
