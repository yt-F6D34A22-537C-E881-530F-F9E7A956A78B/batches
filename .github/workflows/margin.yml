name: Margin Info Fetch (taisyaku.jp + Rakuten)

on:
  schedule:
    - cron: "0 18 * * *"   # JST 3:00（UTC 18:00）
  workflow_dispatch:

permissions:
  contents: write

jobs:
  fetch-margin-info:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y python3 python3-pip
          pip3 install requests pandas beautifulsoup4 lxml

      - name: Run margin-info scraper
        shell: python
        run: |
          import requests
          import pandas as pd
          import json
          import re
          from bs4 import BeautifulSoup

          UA = {"User-Agent": "Mozilla/5.0"}

          # ============================
          # 1. taisyaku.jp CSV 取得
          # ============================
          base = "https://www.taisyaku.jp/data/"

          meigara_df = pd.read_csv(base + "meigara.csv", encoding="shift_jis", dtype=str)
          zandaka_df = pd.read_csv(base + "zandaka.csv", encoding="shift_jis", dtype=str)

          # ★ seigenichiran.csv は先頭4行が説明文 → skiprows=4
          seigenichiran_df = pd.read_csv(
              base + "seigenichiran.csv",
              encoding="shift_jis",
              dtype=str,
              skiprows=4
          )

          # ============================
          # 2. 貸借銘柄（制度信用）
          # ============================
          taisyaku_set = set()
          for _, row in meigara_df.iterrows():
              code = str(row["銘柄コード"]).zfill(4)
              kubun = row["区分"]  # 1=貸借、2=融資、0=非制度
              if kubun in ("1", "2"):
                  taisyaku_set.add(code)

          # ============================
          # 3. 信用残（買残・売残）
          # ============================
          zandaka_map = {}
          for _, row in zandaka_df.iterrows():
              code = str(row["銘柄コード"]).zfill(4)
              buy  = row.get("買残")
              sell = row.get("売残")
              zandaka_map[code] = {
                  "buy": int(buy) if str(buy).isdigit() else None,
                  "sell": int(sell) if str(sell).isdigit() else None
              }

          # ============================
          # 4. 規制情報（seigenichiran.csv）
          # ============================
          regulation_map = {}
          for _, row in seigenichiran_df.iterrows():
              code = str(row["銘柄コード"]).zfill(4)
              reason = f'{row["実施措置"]}:{row["実施内容"]}'
              regulation_map.setdefault(code, []).append(reason)

          # ============================
          # 5. 楽天証券 一般信用（売り建て）
          # ============================
          rakuten_url = "https://www.rakuten-sec.co.jp/web/market/search/general_margin/"
          html = requests.get(rakuten_url, headers=UA).text
          soup = BeautifulSoup(html, "lxml")

          general_map = {}
          for row in soup.select("table tr"):
              cols = row.find_all("td")
              if len(cols) >= 3:
                  code = cols[0].get_text(strip=True)
                  if re.fullmatch(r"\d{4}", code):
                      status = cols[2].get_text(strip=True)  # ◎ / ○ / △ / ×
                      general_map[code] = {
                          "売り建て": status != "×",
                          "在庫区分": status,
                          "在庫数量": None
                      }

          # ============================
          # 6. margin.json 統合
          # ============================
          margin = {}
          all_codes = set(zandaka_map.keys()) | set(taisyaku_set)

          for code in sorted(all_codes):
              buy  = zandaka_map.get(code, {}).get("buy")
              sell = zandaka_map.get(code, {}).get("sell")

              ratio = None
              if buy is not None and sell is not None and sell != 0:
                  ratio = round(buy / sell, 2)

              margin[code] = {
                  "貸借銘柄": code in taisyaku_set,
                  "制度信用": code in taisyaku_set,
                  "一般信用": general_map.get(code, {
                      "売り建て": False,
                      "在庫区分": None,
                      "在庫数量": None
                  }),
                  "信用買い残": buy,
                  "信用売り残": sell,
                  "信用倍率": ratio,
                  "残高種別": "latest",
                  "規制": regulation_map.get(code, [])
              }

          with open("margin.json", "w", encoding="utf-8") as f:
              json.dump(margin, f, ensure_ascii=False, indent=2)

      - name: Commit & Push
        run: |
          git config user.name "github-actions"
          git config user.email "actions@github.com"
          git add margin.json || true
          git commit -m "Auto-update margin.json" || echo "No changes to commit"
          git push
