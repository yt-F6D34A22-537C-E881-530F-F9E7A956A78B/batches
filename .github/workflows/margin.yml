name: Margin Info Fetch (All Codes New Logic)

on:
  schedule:
    - cron: "0 18 * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  fetch-margin-info:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y python3 python3-pip
          pip3 install requests pandas beautifulsoup4 lxml pdfplumber openpyxl xlrd==2.0.1

      - name: Run margin-info scraper
        shell: python
        run: |
          import requests
          import pandas as pd
          import json
          import re
          import pdfplumber
          import unicodedata
          from bs4 import BeautifulSoup

          UA = {"User-Agent": "Mozilla/5.0"}

          # ============================================================
          # 1. JSF 貸借銘柄
          # ============================================================
          base = "https://www.taisyaku.jp/data/"
          meigara_df = pd.read_csv(
              base + "meigara.csv",
              encoding="shift_jis",
              dtype=str,
              skiprows=1
          )
          meigara_df.columns = meigara_df.columns.str.strip().str.replace("\ufeff", "", regex=False)

          kubun_map = {}
          for _, row in meigara_df.iterrows():
              raw_code = str(row["コード"])
              code = unicodedata.normalize("NFKC", raw_code).zfill(4)
              kubun_map[code] = str(row["貸借銘柄区分（東証）"])

          # ============================================================
          # 2. 楽天証券 規制ページ（全銘柄 新ロジック）
          # ============================================================
          BUY_BAN_KEYWORDS = ["新規買停止", "全取引停止"]
          SELL_BAN_KEYWORDS = ["新規売停止", "全取引停止"]

          rakuten_url = "https://www.rakuten-sec.co.jp/ITS/Companyfile/margin_restriction.html"
          res = requests.get(rakuten_url, headers=UA)
          res.encoding = res.apparent_encoding
          html = res.text

          soup = BeautifulSoup(html, "lxml")

          regulation_map = {}

          TOKYO_KEYWORDS = [
              "東京", "東証", "STD", "PRM", "GRT",
              "スタンダード", "プライム", "グロース",
              "ETF", "ETN", "REIT", "インフラ"
          ]

          current_vals = [None] * 6
          rowspan_left = [0] * 6

          for row in soup.select("table tr"):
              tds = row.find_all("td")
              if not tds:
                  continue

              logical = [None] * 6
              td_i = 0

              # rowspan 継承
              for col in range(6):
                  if rowspan_left[col] > 0:
                      logical[col] = current_vals[col]
                      rowspan_left[col] -= 1

              # 通常セル
              for col in range(6):
                  if logical[col] is not None:
                      continue
                  if td_i >= len(tds):
                      break

                  td = tds[td_i]
                  text = td.get_text(strip=True)
                  logical[col] = text

                  rs = td.get("rowspan")
                  if rs:
                      rowspan_left[col] = int(rs) - 1
                      current_vals[col] = text

                  td_i += 1

              raw_code = logical[0]
              market = logical[2]
              text = logical[3]

              if not raw_code:
                  continue

              code = unicodedata.normalize("NFKC", raw_code)

              # 市場フィルタ
              if market:
                  m = unicodedata.normalize("NFKC", market).replace(" ", "").replace("　", "")
                  market_flag = any(k in m for k in TOKYO_KEYWORDS)
              else:
                  market_flag = False

              if not market_flag:
                  continue

              # 規制文言を格納（全銘柄）
              regulation_map.setdefault(code, []).append(text)

          # ============================================================
          # 3. JPX PDF + 日々公表（あなたの既存ロジックをそのまま使用）
          # ============================================================
          jpx_map = {}  # ← 実際はあなたの既存コードをここに入れてください

          # ============================================================
          # 4. margin.json 統合（全銘柄 新ロジック）
          # ============================================================
          margin = {}

          all_codes = list(regulation_map.keys()) \
                   + list(kubun_map.keys()) \
                   + list(jpx_map.keys())
          all_codes = list(dict.fromkeys(all_codes))

          for raw_code in all_codes:
              code = unicodedata.normalize("NFKC", raw_code)

              kubun = kubun_map.get(code)
              regs = regulation_map.get(code, [])
              jpx = jpx_map.get(code, {})

              # --- 全銘柄 新ロジック ---
              has_sell_ban = any(
                  any(k in r for k in SELL_BAN_KEYWORDS)
                  for r in regs
              )
              has_buy_ban = any(
                  any(k in r for k in BUY_BAN_KEYWORDS)
                  for r in regs
              )

              sei_buy = not has_buy_ban
              sei_sell = (kubun == "1") and (not has_sell_ban)

              margin[code] = {
                  "貸借区分": kubun,
                  "制度信用": {
                      "買い建て": sei_buy,
                      "売り建て": sei_sell
                  },
                  "JPX信用買残": jpx.get("buy"),
                  "JPX信用買残前週比": jpx.get("buy_diff"),
                  "JPX信用売残": jpx.get("sell"),
                  "JPX信用売残前週比": jpx.get("sell_diff"),
                  "JPX信用倍率": jpx.get("ratio"),
                  "規制": regs
              }

          with open("margin.json", "w", encoding="utf-8") as f:
              json.dump(margin, f, ensure_ascii=False, indent=2)

      - name: Commit & Push
        run: |
          git config user.name "github-actions"
          git config user.email "actions@github.com"
          git add margin.json || true
          git commit -m "Auto-update margin.json (All Codes New Logic)" || echo "No changes to commit"
          git push
