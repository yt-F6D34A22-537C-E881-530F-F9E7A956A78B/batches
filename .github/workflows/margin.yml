name: Margin Info Fetch (Debug Full Version)

on:
  schedule:
    - cron: "0 18 * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  fetch-margin-info:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y python3 python3-pip
          pip3 install requests pandas beautifulsoup4 lxml pdfplumber openpyxl xlrd==2.0.1

      - name: Run margin-info scraper
        shell: python
        run: |
          import requests
          import pandas as pd
          import json
          import re
          import pdfplumber
          from bs4 import BeautifulSoup

          UA = {"User-Agent": "Mozilla/5.0"}

          # ============================================================
          # 1. JSF 貸借銘柄（制度信用売り建て可否の基礎）
          # ============================================================
          base = "https://www.taisyaku.jp/data/"
          meigara_df = pd.read_csv(
              base + "meigara.csv",
              encoding="shift_jis",
              dtype=str,
              skiprows=1
          )
          meigara_df.columns = meigara_df.columns.str.strip().str.replace("\ufeff", "", regex=False)

          taisyaku_set = set()
          kubun_map = {}

          print("DEBUG meigara columns:", meigara_df.columns)
          print("DEBUG meigara head:\n", meigara_df.head(20))

          for _, row in meigara_df.iterrows():
              code = str(row["コード"]).zfill(4)
              kubun = str(row["貸借銘柄区分（東証）"])
              kubun_map[code] = kubun
              print("DEBUG kubun:", code, kubun)

              if kubun == "1":
                  taisyaku_set.add(code)

          # ============================================================
          # 2. 楽天証券の制度信用規制ページ
          # ============================================================

          BUY_BAN_KEYWORDS = ["新規買停止", "全取引停止"]
          SELL_BAN_KEYWORDS = ["新規売停止", "全取引停止"]

          rakuten_url = "https://www.rakuten-sec.co.jp/ITS/Companyfile/margin_restriction.html"
          res = requests.get(rakuten_url, headers=UA)
          res.encoding = res.apparent_encoding
          html = res.text

          soup = BeautifulSoup(html, "lxml")

          regulation_map = {}
          buy_ban_map = {}
          sell_ban_map = {}

          TOKYO_KEYWORDS = [
              "東京", "東証", "STD", "PRM", "GRT",
              "スタンダード", "プライム", "グロース",
              "ETF", "ETN", "REIT", "インフラ"
          ]

          # ------------------------------------------------------------
          # ★ rowspan 展開デバッグ付き
          # ------------------------------------------------------------
          current_vals = [None] * 6
          rowspan_left = [0] * 6

          for row in soup.select("table tr"):
              tds = row.find_all("td")
              if not tds:
                  continue

              logical = [None] * 6
              td_i = 0

              for col in range(6):
                  if rowspan_left[col] > 0:
                      logical[col] = current_vals[col]
                      rowspan_left[col] -= 1

              for col in range(6):
                  if logical[col] is not None:
                      continue
                  if td_i >= len(tds):
                      break

                  td = tds[td_i]
                  text = td.get_text(strip=True)
                  logical[col] = text

                  rs = td.get("rowspan")
                  if rs:
                      rowspan_left[col] = int(rs) - 1
                      current_vals[col] = text

                  td_i += 1

              print("DEBUG logical:", logical)

              code   = logical[0]
              market = logical[2]
              text   = logical[3]

              print("DEBUG extracted:", code, market, text)
              print("DEBUG market raw:", repr(market))

              if market:
                  m = market.replace(" ", "").replace("　", "")
                  market_flag = any(k in m for k in TOKYO_KEYWORDS)
              else:
                  market_flag = False

              print("DEBUG market check:", market, "→", market_flag)

              if not market_flag:
                  print("DEBUG SKIP (market filtered):", code, market)
                  continue

              print("DEBUG add regulation:", repr(code), repr(text))
              regulation_map.setdefault(code, []).append(text)

              if any(k in text for k in BUY_BAN_KEYWORDS):
                  buy_ban_map[code] = True

              if any(k in text for k in SELL_BAN_KEYWORDS):
                  sell_ban_map[code] = True

          print("DEBUG regulation_map keys:", list(regulation_map.keys()))

          # ============================================================
          # 3. JPX 週次 PDF（syumatsu）
          # ============================================================
          jpx_page = "https://www.jpx.co.jp/markets/statistics-equities/margin/05.html"
          jpx_html = requests.get(jpx_page, headers=UA).text
          jpx_soup = BeautifulSoup(jpx_html, "lxml")

          pdf_links = []
          for a in jpx_soup.find_all("a", href=True):
              href = a["href"]
              if href.endswith(".pdf") and "syumatsu" in href:
                  pdf_links.append("https://www.jpx.co.jp" + href)

          latest_pdf = sorted(pdf_links)[-1]

          pdf_data = requests.get(latest_pdf, headers=UA).content
          with open("jpx.pdf", "wb") as f:
              f.write(pdf_data)

          # ============================================================
          # 4. 日々公表（mtdailyk） XLS
          # ============================================================
          daily_index = "https://www.jpx.co.jp/markets/statistics-equities/margin/index.html"
          daily_html = requests.get(daily_index, headers=UA).text
          daily_soup = BeautifulSoup(daily_html, "lxml")

          daily_links = []
          for a in daily_soup.find_all("a", href=True):
              href = a["href"]
              if re.search(r"mtdailyk.*\.xls$", href):
                  daily_links.append(href)

          latest_daily = sorted(daily_links)[-1]
          daily_url = "https://www.jpx.co.jp" + latest_daily

          daily_df = pd.read_excel(
              daily_url,
              dtype=str,
              engine="xlrd",
              header=5
          )

          code_col = "コード"
          sell_col = "売残高 Outstanding Sales"
          buy_col  = "買残高 Outstanding Purchases"

          daily_map = {}
          for _, row in daily_df.iterrows():
              raw = str(row[code_col])
              if re.fullmatch(r"\d{5}", raw):
                  code4 = raw[:4]
                  try:
                      sell = int(str(row[sell_col]).replace(",", ""))
                      buy  = int(str(row[buy_col]).replace(",", ""))
                  except Exception:
                      continue
                  daily_map[code4] = {"sell": sell, "buy": buy}

          # ============================================================
          # 5. JPX PDF パース
          # ============================================================
          jpx_map = {}

          with pdfplumber.open("jpx.pdf") as pdf:
              full_text = ""
              for page in pdf.pages:
                  t = page.extract_text()
                  if t:
                      full_text += "\n" + t

          blocks = re.split(r"(?=\d{5}\s+JP\d{10})", full_text)

          def parse_num(s):
              s = s.replace(",", "").replace(" ", "")
              if s in ("", "▲"):
                  return 0
              if s.startswith("▲"):
                  return -int(s[1:])
              return int(s)

          for block in blocks:
              m = re.search(r"(\d{5})\s+JP\d{10}", block)
              if not m:
                  continue

              code5 = m.group(1)
              code4 = code5[:4]

              after_isin = re.split(r"JP\d{10}", block)[1]
              nums = re.findall(r"[▲\-]?\s*[\d,]+", after_isin)
              nums = [parse_num(n) for n in nums]

              if len(nums) < 4:
                  continue

              sell = nums[0]
              sell_diff = nums[1]
              buy = nums[2]
              buy_diff = nums[3]

              ratio = round(buy / sell, 2) if sell != 0 else None

              jpx_map[code4] = {
                  "buy": buy,
                  "buy_diff": buy_diff,
                  "sell": sell,
                  "sell_diff": sell_diff,
                  "ratio": ratio
              }

          # ============================================================
          # 6. 日々公表で上書き
          # ============================================================
          for code4, d in daily_map.items():
              if code4 in jpx_map:
                  prev_buy = jpx_map[code4]["buy"]
                  prev_sell = jpx_map[code4]["sell"]

                  new_buy = d["buy"]
                  new_sell = d["sell"]

                  jpx_map[code4]["buy"] = new_buy
                  jpx_map[code4]["sell"] = new_sell

                  jpx_map[code4]["buy_diff"] = new_buy - prev_buy
                  jpx_map[code4]["sell_diff"] = new_sell - prev_sell

                  jpx_map[code4]["ratio"] = (
                      round(new_buy / new_sell, 2) if new_sell != 0 else None
                  )
              else:
                  jpx_map[code4] = {
                      "buy": d["buy"],
                      "buy_diff": None,
                      "sell": d["sell"],
                      "sell_diff": None,
                      "ratio": round(d["buy"] / d["sell"], 2) if d["sell"] != 0 else None
                  }

          # ============================================================
          # 7. margin.json 統合（デバッグ付き）
          # ============================================================
          margin = {}
          all_codes = set(kubun_map.keys()) | set(jpx_map.keys()) | set(regulation_map.keys())

          for code in sorted(all_codes):
              kubun = kubun_map.get(code)
              regs = regulation_map.get(code, [])
              jpx = jpx_map.get(code, {})

              has_buy_ban = buy_ban_map.get(code, False)
              has_sell_ban = sell_ban_map.get(code, False)

              sei_buy = not has_buy_ban
              sei_sell = (kubun == "1") and (not has_sell_ban)

              print("DEBUG merge code:", repr(code), "→ regs:", regs)

              margin[code] = {
                  "貸借区分": kubun,
                  "制度信用": {
                      "買い建て": sei_buy,
                      "売り建て": sei_sell
                  },
                  "JPX信用買残": jpx.get("buy"),
                  "JPX信用買残前週比": jpx.get("buy_diff"),
                  "JPX信用売残": jpx.get("sell"),
                  "JPX信用売残前週比": jpx.get("sell_diff"),
                  "JPX信用倍率": jpx.get("ratio"),
                  "規制": regs
              }

          with open("margin.json", "w", encoding="utf-8") as f:
              json.dump(margin, f, ensure_ascii=False, indent=2)

      - name: Commit & Push
        run: |
          git config user.name "github-actions"
          git config user.email "actions@github.com"
          git add margin.json || true
          git commit -m "Auto-update margin.json (Full Debug Version)" || echo "No changes to commit"
          git push
