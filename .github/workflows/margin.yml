name: Debug JSF CSV headers

on:
  workflow_dispatch:

jobs:
  debug-jsf:
    runs-on: ubuntu-latest
    steps:
      - name: Install Python
        run: |
          sudo apt-get update
          sudo apt-get install -y python3 python3-pip
          pip3 install pandas

      - name: Show CSV headers
        shell: python
        run: |
          import pandas as pd

          base = "https://www.taisyaku.jp/data/"

          for name in ["meigara.csv", "zandaka.csv", "seigenichiran.csv"]:
              print("====", name, "====")
              if name == "seigenichiran.csv":
                  df = pd.read_csv(base + name, encoding="shift_jis", dtype=str, skiprows=4)
              else:
                  df = pd.read_csv(base + name, encoding="shift_jis", dtype=str)
              print(df.columns.tolist())
              print(df.head(3))
