name: Margin Info Fetch (Daily Override Auto Detect)

on:
  schedule:
    - cron: "0 18 * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  fetch-margin-info:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y python3 python3-pip
          pip3 install requests pandas beautifulsoup4 lxml pdfplumber openpyxl xlrd==2.0.1

      - name: Run margin-info scraper
        shell: python
        run: |
          import requests
          import pandas as pd
          import json
          import re
          import pdfplumber
          from bs4 import BeautifulSoup

          UA = {"User-Agent": "Mozilla/5.0"}

          # ============================
          # JSF meigara.csv（貸借銘柄）
          # ============================
          base = "https://www.taisyaku.jp/data/"
          meigara_df = pd.read_csv(
              base + "meigara.csv",
              encoding="shift_jis",
              dtype=str,
              skiprows=1
          )
          meigara_df.columns = meigara_df.columns.str.strip().str.replace("\ufeff", "", regex=False)

          taisyaku_set = set()
          for _, row in meigara_df.iterrows():
              code = str(row["コード"]).zfill(4)
              kubun = row["貸借銘柄区分（東証）"]
              if kubun in ("1", "2"):
                  taisyaku_set.add(code)

          # ============================
          # JSF seigenichiran.csv（規制）
          # ============================
          sei_df = pd.read_csv(
              base + "seigenichiran.csv",
              encoding="shift_jis",
              dtype=str,
              skiprows=4
          )
          sei_df = sei_df.iloc[:-3]
          sei_df.columns = sei_df.columns.str.strip().str.replace("\ufeff", "", regex=False)

          regulation_map = {}
          for _, row in sei_df.iterrows():
              code = str(row["銘柄コード"]).zfill(4)
              reason_raw = row["実施内容"]
              if pd.notna(reason_raw):
                  reason = f'{row["実施措置"]}:{reason_raw}'
              else:
                  reason = row["実施措置"]
              regulation_map.setdefault(code, []).append(reason)

          # ============================
          # 楽天 一般信用
          # ============================
          rakuten_url = "https://www.rakuten-sec.co.jp/web/market/search/general_margin/"
          html = requests.get(rakuten_url, headers=UA).text
          soup = BeautifulSoup(html, "lxml")

          general_map = {}
          for row in soup.select("table tr"):
              cols = row.find_all("td")
              if len(cols) >= 3:
                  code = cols[0].get_text(strip=True)
                  if re.fullmatch(r"\d{4}", code):
                      status = cols[2].get_text(strip=True)
                      general_map[code] = {
                          "売り建て": status != "×",
                          "在庫区分": status,
                          "在庫数量": None
                      }

          # ============================
          # JPX 週次 PDF（syumatsu）
          # ============================
          jpx_page = "https://www.jpx.co.jp/markets/statistics-equities/margin/05.html"
          jpx_html = requests.get(jpx_page, headers=UA).text
          jpx_soup = BeautifulSoup(jpx_html, "lxml")

          pdf_links = []
          for a in jpx_soup.find_all("a", href=True):
              href = a["href"]
              if href.endswith(".pdf") and "syumatsu" in href:
                  pdf_links.append("https://www.jpx.co.jp" + href)

          latest_pdf = sorted(pdf_links)[-1]

          pdf_data = requests.get(latest_pdf, headers=UA).content
          with open("jpx.pdf", "wb") as f:
              f.write(pdf_data)

          # ============================
          # ★ 日々公表（mtdailyk） XLS 自動検出 ★
          # ============================
          daily_index = "https://www.jpx.co.jp/markets/statistics-equities/margin/index.html"
          daily_html = requests.get(daily_index, headers=UA).text
          daily_soup = BeautifulSoup(daily_html, "lxml")

          daily_links = []
          for a in daily_soup.find_all("a", href=True):
              href = a["href"]
              if re.search(r"mtdailyk.*\.xls$", href):
                  daily_links.append(href)

          if not daily_links:
              raise Exception("日々公表 mtdailyk*.xls が見つかりませんでした")

          latest_daily = sorted(daily_links)[-1]

          if latest_daily.startswith("/"):
              daily_url = "https://www.jpx.co.jp" + latest_daily
          else:
              daily_url = latest_daily

          # ★ XLS を xlrd 2.0.1 で読み込む（ヘッダー行を 5 行スキップ）
          daily_df = pd.read_excel(
              daily_url,
              dtype=str,
              engine="xlrd",
              header=5   # ← これが最重要
          )

          # ============================
          # ★ デバッグ出力 ★
          # ============================
          print("=== DEBUG: daily_url ===")
          print(daily_url)

          print("=== DEBUG: daily_df.columns ===")
          print(list(daily_df.columns))

          print("=== DEBUG: daily_df.head(10) ===")
          print(daily_df.head(10).to_string())

          # ============================
          # ★ 列名で正しく参照（G=Code, I=売残, L=買残） ★
          # ============================
          code_col = "Code"
          sell_col = "売残高 Outstanding Sales"
          buy_col  = "買残高 Outstanding Purchases"

          daily_map = {}
          for _, row in daily_df.iterrows():
              raw = str(row[code_col])
              if re.fullmatch(r"\d{5}", raw):
                  code4 = raw[:4]
                  try:
                      sell = int(str(row[sell_col]).replace(",", ""))
                      buy  = int(str(row[buy_col]).replace(",", ""))
                  except:
                      continue
                  daily_map[code4] = {"sell": sell, "buy": buy}

          print("=== DEBUG: daily_map keys (first 20) ===")
          print(list(daily_map.keys())[:20])

          print("=== DEBUG: 4833 in daily_map? ===")
          print("4833" in daily_map)

          # ============================
          # JPX PDF パース（週次 syumatsu）
          # ============================
          jpx_map = {}

          with pdfplumber.open("jpx.pdf") as pdf:
              full_text = ""
              for page in pdf.pages:
                  t = page.extract_text()
                  if t:
                      full_text += "\n" + t

          blocks = re.split(r"(?=\d{5}\s+JP\d{10})", full_text)

          def parse_num(s):
              s = s.replace(",", "").replace(" ", "")
              if s in ("", "▲"):
                  return 0
              if s.startswith("▲"):
                  return -int(s[1:])
              return int(s)

          for block in blocks:
              m = re.search(r"(\d{5})\s+JP\d{10}", block)
              if not m:
                  continue

              code5 = m.group(1)
              code4 = code5[:4]

              after_isin = re.split(r"JP\d{10}", block)[1]
              nums = re.findall(r"[▲\-]?\s*[\d,]+", after_isin)
              nums = [parse_num(n) for n in nums]

              if len(nums) < 4:
                  continue

              sell = nums[0]
              sell_diff = nums[1]
              buy = nums[2]
              buy_diff = nums[3]

              ratio = round(buy / sell, 2) if sell != 0 else None

              jpx_map[code4] = {
                  "buy": buy,
                  "buy_diff": buy_diff,
                  "sell": sell,
                  "sell_diff": sell_diff,
                  "ratio": ratio
              }

          # ============================
          # ★ 日々公表（mtdailyk）で上書き ★
          # ============================
          print("=== DEBUG: jpx_map[4833] BEFORE override ===")
          print(jpx_map.get("4833"))

          for code4, d in daily_map.items():
              if code4 in jpx_map:
                  jpx_map[code4]["sell"] = d["sell"]
                  jpx_map[code4]["buy"]  = d["buy"]
                  jpx_map[code4]["ratio"] = (
                      round(d["buy"] / d["sell"], 2) if d["sell"] != 0 else None
                  )
              else:
                  jpx_map[code4] = {
                      "buy": d["buy"],
                      "buy_diff": None,
                      "sell": d["sell"],
                      "sell_diff": None,
                      "ratio": round(d["buy"] / d["sell"], 2) if d["sell"] != 0 else None
                  }

          print("=== DEBUG: jpx_map[4833] AFTER override ===")
          print(jpx_map.get("4833"))

          # ============================
          # margin.json 統合
          # ============================
          margin = {}
          all_codes = set(taisyaku_set) | set(jpx_map.keys()) | set(general_map.keys())

          for code in sorted(all_codes):
              jpx = jpx_map.get(code, {})

              margin[code] = {
                  "貸借銘柄": code in taisyaku_set,
                  "一般信用": general_map.get(code, {
                      "売り建て": False,
                      "在庫区分": None,
                      "在庫数量": None
                  }),
                  "JPX信用買残": jpx.get("buy"),
                  "JPX信用買残前週比": jpx.get("buy_diff"),
                  "JPX信用売残": jpx.get("sell"),
                  "JPX信用売残前週比": jpx.get("sell_diff"),
                  "JPX信用倍率": jpx.get("ratio"),
                  "規制": regulation_map.get(code, [])
              }

          with open("margin.json", "w", encoding="utf-8") as f:
              json.dump(margin, f, ensure_ascii=False, indent=2)

      - name: Commit & Push
        run: |
          git config user.name "github-actions"
          git config user.email "actions@github.com"
          git add margin.json || true
          git commit -m "Auto-update margin.json (daily override debug)" || echo "No changes to commit"
          git push
