name: 【margin.yml】Margin Info Fetch

on:
  schedule:
    - cron: "0 18 * * *"   # JST 3:00（UTC 18:00）
  workflow_dispatch:

permissions:
  contents: write

jobs:
  fetch-margin-info:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "24"

      - name: Install dependencies
        run: |
          npm install node-fetch@3 xlsx jsdom pdfjs-dist iconv-lite

      - name: Ensure data directory exists
        run: mkdir -p data

      - name: Run margin.js
        run: node margin.js

      - name: Commit & Push
        run: |
          git config --global user.name "github-actions"
          git config --global user.email "github-actions@github.com"
          git add data/margin.json data/backup/ || true
          git commit -m "Auto-update margin.json + backup" || echo "No changes"
          git pull --rebase || true
          git push
